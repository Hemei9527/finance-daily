---
layout: default
title: 每日财经资讯
---

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }}</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #333; line-height: 1.6; }
    .container { max-width: 800px; margin: 0 auto; padding: 20px; }
    header { background: #1a1a2e; color: #fff; padding: 30px 20px; text-align: center; margin-bottom: 30px; }
    header h1 { font-size: 1.8rem; font-weight: 600; }
    header p { font-size: 0.9rem; opacity: 0.7; margin-top: 8px; }
    .date-nav { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .date-btn { padding: 8px 16px; background: #fff; border: 1px solid #ddd; border-radius: 6px; text-decoration: none; color: #333; font-size: 0.9rem; transition: all 0.2s; }
    .date-btn:hover { background: #1a1a2e; color: #fff; border-color: #1a1a2e; }
    .date-btn.active { background: #1a1a2e; color: #fff; border-color: #1a1a2e; }
    .post { background: #fff; border-radius: 8px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .post h2 { font-size: 1.2rem; margin-bottom: 12px; color: #1a1a2e; }
    .post-meta { font-size: 0.85rem; color: #888; margin-bottom: 16px; }
    .post h3 { font-size: 1rem; color: #444; margin: 16px 0 8px; }
    .post ul { padding-left: 20px; }
    .post li { margin-bottom: 6px; }
    .section-stock { background: #e8f5e9; padding: 12px 16px; border-radius: 6px; margin-bottom: 12px; }
    .section-crypto { background: #fff3e0; padding: 12px 16px; border-radius: 6px; margin-bottom: 12px; }
    .section-macro { background: #e3f2fd; padding: 12px 16px; border-radius: 6px; margin-bottom: 12px; }
    footer { text-align: center; padding: 20px; color: #888; font-size: 0.85rem; }
    @media (max-width: 600px) { .container { padding: 12px; } header { padding: 20px 12px; } header h1 { font-size: 1.4rem; } .post { padding: 16px; } }
  </style>
</head>
<body>
  <header>
    <h1>{{ page.title }}</h1>
    <p>由 Jerry 🐭 每日整理 · {{ site.timezone }}</p>
  </header>
  <div class="container">
    <nav class="date-nav">
      {% for post in site.posts %}
        <a href="{{ post.url }}" class="date-btn{% if post.url == page.url %} active{% endif %}">{{ post.date | date: "%m-%d" }}</a>
      {% endfor %}
    </nav>
    <article class="post">
      {{ content }}
    </article>
  </div>
  <footer>Powered by Jerry · Updated daily at 07:30</footer>
</body>
</html>
